<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found · Learning Corner</title>
<style>
  :root {
    --ink: #1a1a1a; --paper: #fdfcf9; --rule: #d8d4c8;
    --accent: #8a3324; --muted: #6b6256; --link: #1d4e6f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  main { max-width: 32rem; }
  .code {
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 5rem; font-weight: 700; line-height: 1; color: var(--accent);
    letter-spacing: -0.02em; margin: 0;
  }
  .eyebrow {
    font-family: -apple-system, system-ui, sans-serif;
    text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.75rem;
    color: var(--muted); margin: 0 0 0.75rem;
  }
  h1 { font-size: 1.6rem; margin: 1.25rem 0 0.5rem; }
  p { color: var(--muted); line-height: 1.55; margin: 0 0 1.5rem; }
  hr { border: 0; border-top: 1px solid var(--rule); margin: 1.5rem 0; }
  a.home {
    font-family: -apple-system, system-ui, sans-serif; font-size: 0.95rem;
    color: var(--link); text-decoration-thickness: 1px; text-underline-offset: 2px;
  }
  a.home::before { content: "⌂ "; }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Learning Corner</p>
  <p class="code">404</p>
  <h1>This page wandered off.</h1>
  <p>The lesson or reference you're after isn't here — it may have been renamed, moved into a course folder, or never existed. No notes were harmed.</p>
  <hr>
  <a class="home" href="/learning-corner/">Back to the hub</a>
</main>
</body>
</html>
